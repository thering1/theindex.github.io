<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Index</title>
    <link rel="icon" type="image/png" href="IndexProselytesIcon.png">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --index-black: #000000;
            --index-blue: #00f2ff;
            --index-white: #ffffff;
        }

        body { 
            margin: 0; padding: 0; 
            font-family: 'Share Tech Mono', monospace; 
            background: var(--index-black); 
            color: var(--index-blue);
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        .header { padding: 10px; text-align: center; border-bottom: 1px solid var(--index-blue); }
        h1 { margin: 0; font-size: 2.2rem; letter-spacing: 10px; text-transform: uppercase; text-shadow: 0 0 8px var(--index-blue); }

        .main-layout { display: flex; flex-grow: 1; overflow: hidden; position: relative; }

        /* --- SIDEBAR --- */
        #prescript-sidebar {
            width: 15%; 
            border: 1px solid var(--index-blue); margin: 10px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: var(--index-black); gap: 20px;
        }
        .side-icon { width: 80%; object-fit: contain; }
        #prescript-content { text-align: center; padding: 0 10px; }
        .prescript-label { font-size: 0.7rem; opacity: 0.6; margin-bottom: 8px; letter-spacing: 2px; }
        #prescript-text { font-size: 0.9rem; color: var(--index-blue); text-shadow: 0 0 5px var(--index-blue); }

        /* --- MESSENGER: YAN BACKGROUND --- */
        #messenger-outer {
            flex-grow: 1; margin: 10px 10px 10px 0; 
            background: url('YanBackground.png') no-repeat center center;
            background-size: cover;
            border: 2px solid var(--index-black); position: relative; display: flex;
        }

        #lockdown-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--index-black); z-index: 50;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 1px solid var(--index-blue);
        }
        #lockdown-overlay img { width: 120px; margin-bottom: 20px; }

        /* --- MESSAGE STYLING: NO BLUE OUTLINES --- */
        #chat-window { flex-grow: 1; display: flex; flex-direction: column; }
        #messages-display { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        
        .msg-container { align-self: flex-start; width: 70%; display: flex; flex-direction: column; }
        
        .msg-header { 
            background: rgba(0, 0, 0, 0.95);
            color: var(--index-blue); 
            padding: 6px 12px; 
            font-size: 0.7rem; 
            width: 100%; /* Full length of the box */
            box-sizing: border-box;
            letter-spacing: 1px;
        }
        
        .msg-body { 
            background: rgba(0, 0, 0, 0.65);
            color: white; 
            padding: 12px 15px; 
            font-size: 0.9rem; 
            width: 100%;
            box-sizing: border-box;
            line-height: 1.4;
        }

        /* --- CHAT LIST SIDEBAR --- */
        #chat-sidebar { width: 280px; border-left: 1px solid var(--index-blue); display: flex; flex-direction: column; background: rgba(0, 0, 0, 0.9); color: var(--index-blue); }
        .search-nav { padding: 10px; border-bottom: 1px solid var(--index-blue); display: flex; flex-direction: column; gap: 8px; }
        #chatSearch { background: black; color: var(--index-blue); border: 1px solid var(--index-blue); padding: 8px; font-family: inherit; }
        
        #chat-list { flex-grow: 1; overflow-y: auto; }
        .chat-entry { padding: 15px; border-bottom: 1px solid rgba(0, 242, 255, 0.1); cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .chat-entry:hover { background: rgba(0, 242, 255, 0.1); }
        .chat-entry.active { background: var(--index-blue); color: black; font-weight: bold; }
        .unread-dot { width: 8px; height: 8px; background: red; border-radius: 50%; box-shadow: 0 0 8px red; }

        /* --- CONTROLS --- */
        .controls { 
            background: var(--index-black); padding: 15px; border-top: 1px solid var(--index-blue);
            display: flex; justify-content: center; gap: 30px; z-index: 1000;
        }
        .nav-btn { color: var(--index-blue); text-decoration: none; font-size: 0.8rem; border: 1px solid var(--index-blue); padding: 5px 15px; }
        .auth-trigger { background: transparent; color: var(--index-blue); border: 1px solid var(--index-blue); font-family: inherit; cursor: pointer; padding: 5px 15px; }

        .modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: black; border: 1px solid var(--index-blue); padding: 20px; z-index: 3000;
            width: 400px; box-shadow: 0 0 20px var(--index-blue); color: var(--index-blue);
        }
        .input-full { width: 94%; padding: 8px; margin: 10px 0; background: #111; border: 1px solid var(--index-blue); color: white; font-family: inherit; }
        .blue-btn { background: var(--index-blue); color: black; border: none; padding: 8px 15px; cursor: pointer; font-family: inherit; font-weight: bold; }

        #msg-input-area { padding: 15px; background: rgba(0, 0, 0, 0.95); border-top: 1px solid var(--index-blue); display: flex; gap: 10px; }
        #msgInput { flex-grow: 1; background: black; border: 1px solid var(--index-blue); color: white; padding: 8px; font-family: inherit; }
    </style>
</head>
<body>

    <div class="header">
        <h1>THE INDEX</h1>
    </div>

    <div class="main-layout">
        <div id="prescript-sidebar">
            <img src="IndexProselytesIcon.png" class="side-icon">
            <div id="prescript-content">
                <div class="prescript-label">YOUR PRESCRIPT:</div>
                <div id="prescript-text">WAITING FOR UPLINK...</div>
            </div>
        </div>

        <div id="messenger-outer">
            <div id="lockdown-overlay">
                <img src="IndexProselytesIcon.png" alt="Lock">
                <span>Must be logged into an account.</span>
            </div>

            <div id="chat-window">
                <div id="messages-display"></div>
                <div id="msg-input-area" style="display:none;">
                    <input type="text" id="msgInput" placeholder="ENTER TRANSMISSION...">
                    <button class="blue-btn" id="sendMsgBtn">SEND</button>
                </div>
            </div>

            <div id="chat-sidebar">
                <div class="search-nav">
                    <button class="blue-btn" id="newChatBtn" style="width:100%">+ NEW MESSAGE</button>
                    <input type="text" id="chatSearch" placeholder="Search conversations..." oninput="filterChats()">
                </div>
                <div id="chat-list"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <a href="https://thering1.github.io/thering.github.io/" class="nav-btn">THE RING</a>
        <a href="https://thering1.github.io/themiddle.github.io/" class="nav-btn">THE MIDDLE</a>
        <button id="auth-btn" class="auth-trigger">SIGN IN</button>
    </div>

    <div id="new-msg-modal" class="modal">
        <h3 style="margin-top:0">NEW MESSAGE</h3>
        <input type="text" id="targetDisplay" placeholder="Recipient Display Name" class="input-full">
        <textarea id="initialMsg" placeholder="Message content..." class="input-full" rows="3"></textarea>
        <div style="display:flex; justify-content: flex-end; gap: 10px;">
            <button onclick="document.getElementById('new-msg-modal').style.display='none'">X</button>
            <button class="blue-btn" id="startChatBtn">SEND</button>
        </div>
    </div>

    <div id="auth-modal" class="modal">
        <div id="login-view">
            <h3>IDENTIFY</h3>
            <input type="text" id="uIn" placeholder="User" class="input-full">
            <input type="password" id="pIn" placeholder="Pass" class="input-full">
            <button class="blue-btn" id="loginBtn">LOG IN</button>
        </div>
        <div id="lord-view" style="display:none;">
            <h3 id="welcome-header"></h3>
            <div id="lord-tools" style="display:none;">
                <label style="font-size:0.7rem">UPDATE GLOBAL PRESCRIPT:</label>
                <textarea id="newPrescript" class="input-full"></textarea>
                <button class="blue-btn" id="updatePrescriptBtn">ENFORCE</button>
            </div>
            <hr style="border-color: var(--index-blue)">
            <button onclick="location.reload()" class="blue-btn">LOGOUT</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, get, update, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const accountConfig = {
            apiKey: "AIzaSyDHSXFPCiG2kjRAFzqUJn1OQoXD1bCtfH8",
            authDomain: "account-data-54450.firebaseapp.com",
            databaseURL: "https://account-data-54450-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "account-data-54450"
        };

        const indexConfig = {
            apiKey: "AIzaSyD3EnqA3hUQHFtlghJ19S6Wa8SxLwGFBwk",
            authDomain: "index-data-4a3b9.firebaseapp.com",
            databaseURL: "https://index-data-4a3b9-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "index-data-4a3b9"
        };

        const accApp = initializeApp(accountConfig, "accApp");
        const idxApp = initializeApp(indexConfig, "idxApp");
        const userDb = getDatabase(accApp);
        const indexDb = getDatabase(idxApp);

        let currentUser = null;
        let activeChatId = null;

        const sanitize = (str) => {
            const div = document.createElement('div');
            div.textContent = str || "";
            return div.innerHTML;
        };

        onValue(ref(indexDb, 'global_prescript'), snap => {
            document.getElementById('prescript-text').innerText = snap.val() || "NO ORDERS RECEIVED.";
        });

        document.getElementById('auth-btn').onclick = () => document.getElementById('auth-modal').style.display = 'block';
        
        document.getElementById('loginBtn').onclick = async () => {
            const u = document.getElementById('uIn').value, p = document.getElementById('pIn').value;
            const snap = await get(ref(userDb, `users/${u}`));
            if(snap.exists() && snap.val().password === p) {
                currentUser = snap.val(); 
                currentUser.username = u;
                
                document.getElementById('lockdown-overlay').style.display = 'none';
                document.getElementById('login-view').style.display = 'none';
                document.getElementById('lord-view').style.display = 'block';
                document.getElementById('welcome-header').innerText = `${currentUser.display_name}, ${currentUser.rank} of the ${currentUser.finger || 'Void'}`;
                
                if(currentUser.rank === 'Lord') document.getElementById('lord-tools').style.display = 'block';
                
                loadChatList();
                document.getElementById('auth-modal').style.display = 'none';
                document.getElementById('auth-btn').innerText = "ACCOUNT";
            } else alert("Unknown Identity.");
        };

        document.getElementById('updatePrescriptBtn').onclick = () => {
            set(ref(indexDb, 'global_prescript'), document.getElementById('newPrescript').value);
            alert("Prescript Distributed.");
        };

        function loadChatList() {
            onValue(ref(indexDb, `user_chats/${currentUser.username}`), snap => {
                const list = document.getElementById('chat-list');
                list.innerHTML = "";
                const chats = [];
                snap.forEach(c => { chats.push({id: c.key, ...c.val()}); });
                chats.sort((a, b) => b.last_updated - a.last_updated);

                chats.forEach(chat => {
                    const div = document.createElement('div');
                    div.className = `chat-entry ${activeChatId === chat.id ? 'active' : ''}`;
                    div.innerHTML = `<span>${chat.with_name}</span>`;
                    if(chat.unread) {
                        const dot = document.createElement('div');
                        dot.className = 'unread-dot';
                        div.appendChild(dot);
                    }
                    div.onclick = () => openChat(chat.id, chat.with_name);
                    list.appendChild(div);
                });
            });
        }

        async function openChat(chatId, withName) {
            activeChatId = chatId;
            document.getElementById('msg-input-area').style.display = 'flex';
            update(ref(indexDb, `user_chats/${currentUser.username}/${chatId}`), { unread: false });

            onValue(ref(indexDb, `messages/${chatId}`), snap => {
                const display = document.getElementById('messages-display');
                display.innerHTML = "";
                snap.forEach(m => {
                    const msg = m.val();
                    const container = document.createElement('div');
                    container.className = 'msg-container';
                    
                    const header = document.createElement('div');
                    header.className = 'msg-header';
                    // Fallback to "Unknown" if data is missing
                    const d = sanitize(msg.sender_display || "Anonymous");
                    const r = sanitize(msg.sender_rank || "Unknown");
                    const f = sanitize(msg.sender_finger || "Void");
                    header.innerText = `${d}, ${r} of the ${f}`;
                    
                    const body = document.createElement('div');
                    body.className = 'msg-body';
                    body.innerText = msg.text;
                    
                    container.appendChild(header);
                    container.appendChild(body);
                    display.appendChild(container);
                });
                display.scrollTop = display.scrollHeight;
            });
        }

        document.getElementById('sendMsgBtn').onclick = async () => {
            const text = document.getElementById('msgInput').value;
            if(!text || !activeChatId || !currentUser) return;
            
            const parts = activeChatId.split("_");
            const recipient = parts[0] === currentUser.username ? parts[1] : parts[0];

            await push(ref(indexDb, `messages/${activeChatId}`), {
                sender: currentUser.username,
                sender_display: currentUser.display_name,
                sender_rank: currentUser.rank,
                sender_finger: currentUser.finger || 'Void',
                text: text,
                timestamp: serverTimestamp()
            });

            const ts = Date.now();
            await update(ref(indexDb, `user_chats/${currentUser.username}/${activeChatId}`), { last_updated: ts });
            await update(ref(indexDb, `user_chats/${recipient}/${activeChatId}`), { last_updated: ts, unread: true });

            document.getElementById('msgInput').value = "";
        };

        document.getElementById('newChatBtn').onclick = () => document.getElementById('new-msg-modal').style.display = 'block';

        document.getElementById('startChatBtn').onclick = async () => {
            const targetName = document.getElementById('targetDisplay').value;
            const text = document.getElementById('initialMsg').value;
            if(!text || !currentUser) return;

            const usersSnap = await get(ref(userDb, 'users'));
            let targetUsername = null;
            
            usersSnap.forEach(u => { 
                if(u.val().display_name === targetName) targetUsername = u.key;
            });

            if(!targetUsername) { alert("Recipient not found."); return; }

            const chatId = [currentUser.username, targetUsername].sort().join("_");
            const ts = Date.now();
            
            const updateObj = {};
            updateObj[`user_chats/${currentUser.username}/${chatId}`] = { with_name: targetName, last_updated: ts, unread: false };
            updateObj[`user_chats/${targetUsername}/${chatId}`] = { with_name: currentUser.display_name, last_updated: ts, unread: true };
            
            await update(ref(indexDb), updateObj);
            await push(ref(indexDb, `messages/${chatId}`), {
                sender: currentUser.username,
                sender_display: currentUser.display_name,
                sender_rank: currentUser.rank,
                sender_finger: currentUser.finger || 'Void',
                text: text,
                timestamp: serverTimestamp()
            });

            document.getElementById('new-msg-modal').style.display = 'none';
            openChat(chatId, targetName);
        };

        window.filterChats = () => {
            const q = document.getElementById('chatSearch').value.toLowerCase();
            document.querySelectorAll('.chat-entry').forEach(el => {
                el.style.display = el.innerText.toLowerCase().includes(q) ? 'flex' : 'none';
            });
        };
    </script>
</body>
</html>
